<!-- ══════════════════════════════════════════════════════════════════
     FACEBOOK MESSENGER CHAT BUBBLE
     To update for a new client:
       1. Replace YOUR_PAGE_ID below with the client's Facebook Page ID
          (Find it at: facebook.com/[pagename]/about → Page ID at bottom)
       2. Replace the themeColor if needed
     For Bethel Pawn: Page name is BethelPawn
     ══════════════════════════════════════════════════════════════════ -->
<div id="fb-root"></div>
<div id="fb-customer-chat" class="fb-customerchat"
  attribution="biz_inbox"
  page_id="YOUR_PAGE_ID"
  theme_color="#C8A24A"
  logged_in_greeting="Hi! Have a question about buying, selling, or pawning? We&#39;re happy to help."
  logged_out_greeting="Hi! Have a question about buying, selling, or pawning? Send us a message and we&#39;ll get right back to you."
  greeting_dialog_display="hide"
  greeting_dialog_delay="5">
</div>
<script>
  window.fbAsyncInit = function() {
    FB.init({ xfbml: true, version: 'v18.0' });
  };
  (function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s); js.id = id;
    js.src = 'https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
    fjs.parentNode.insertBefore(js, fjs);
  }(document, 'script', 'facebook-jssdk'));
</script>

</body>
</html>
